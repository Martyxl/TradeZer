name: Tradezer Cron Jobs

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      job:
        description: "Which job to run (refresh / predict / calibrate / all)"
        required: false
        default: "all"

env:
  API_URL: https://trade-zer.vercel.app
  TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}

jobs:
  refresh:
    name: Refresh news feed
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'refresh' || github.event.inputs.job == 'all'))
    steps:
      - name: POST /api/refresh
        run: |
          echo "Running refresh at $(date -u)"
          curl -s -o /tmp/refresh.json -w "HTTP %{http_code}\n" \
            --max-time 30 \
            -X POST "$API_URL/api/refresh" \
            -H "X-Internal-Token: $TOKEN"
          cat /tmp/refresh.json

  predict:
    name: Process predictions
    runs-on: ubuntu-latest
    needs: refresh
    if: always() && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'predict' || github.event.inputs.job == 'all')))
    steps:
      - name: POST /api/predict (up to 4 attempts)
        run: |
          echo "Running predict at $(date -u)"
          for i in 1 2 3 4; do
            # exit code 28 = curl timeout — Vercel může stále zpracovávat, pokračuj
            curl -s -o /tmp/predict.json -w "\nHTTP %{http_code}\n" \
              --max-time 58 \
              -X POST "$API_URL/api/predict" \
              -H "X-Internal-Token: $TOKEN" || true
            cat /tmp/predict.json || true
            REMAINING=$(grep -o '"remaining":[0-9]*' /tmp/predict.json 2>/dev/null | grep -o '[0-9]*$' || echo "1")
            echo "Remaining after attempt $i: $REMAINING"
            if [ "$REMAINING" = "0" ]; then
              echo "All predictions done."
              break
            fi
            sleep 3
          done

  calibrate:
    name: Calibrate market reactions
    runs-on: ubuntu-latest
    needs: predict
    if: always() && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'calibrate' || github.event.inputs.job == 'all')))
    steps:
      - name: POST /api/calibrate
        run: |
          echo "Running calibrate at $(date -u)"
          curl -s -o /tmp/calibrate.json -w "\nHTTP %{http_code}\n" \
            --max-time 58 \
            -X POST "$API_URL/api/calibrate" \
            -H "X-Internal-Token: $TOKEN" || true
          cat /tmp/calibrate.json
