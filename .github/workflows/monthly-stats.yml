name: Monthly Market Stats Refresh

on:
  schedule:
    # 1. den v měsíci, 06:00 UTC — stáhne nová data a přepočítá /stats
    - cron: "0 6 1 * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install pandas numpy

      - name: Download XAUUSD 5m data (13 months)
        run: bash data/download.sh xauusd

      - name: Download US Tech 100 5m data (13 months)
        run: bash data/download.sh usatechidxusd

      - name: Download Dow Jones 5m data (13 months)
        run: bash data/download.sh usa30idxusd

      - name: Compute stats (embeds previous month as baseline)
        run: python data/compute_stats.py

      - name: Commit & push updated stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/public/stats/
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: monthly market stats refresh ($(date -u +%Y-%m))"
            git push
          fi
