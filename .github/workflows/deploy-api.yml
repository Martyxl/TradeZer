name: Deploy API to Vercel

on:
  push:
    branches: [main]
    paths:
      - "api/**"

jobs:
  deploy:
    name: Trigger Vercel deploy
    runs-on: ubuntu-latest
    steps:
      - name: Deploy API
        run: |
          curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_API }}" \
            -o /tmp/deploy.json
          cat /tmp/deploy.json
          echo "Deploy triggered"
